{% extends "base.html" %}
{% block title %}Новый проект · IdeaVault{% endblock %}
{% block body %}
<h1>Создать проект</h1>
<p><a href="/ui">← К списку</a></p>
<form method="post" action="/ui/project/create">
  <p><label>Имя<br><input type="text" name="name" required maxlength="255" size="40"></label></p>
  <p><label>Описание<br><textarea name="description" rows="3" cols="50"></textarea></label></p>
  <button type="submit">Создать</button>
</form>
{% endblock %}
